<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mockup — Active Workout v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #111; color: #fff;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 30px 0 60px; min-height: 100vh;
  direction: rtl;
}

.phone {
  width: 390px;
  background: #000;
  border-radius: 44px;
  border: 1.5px solid rgba(255,255,255,0.12);
  overflow: hidden;
  box-shadow: 0 50px 120px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
  position: relative;
  min-height: 844px;
  display: flex; flex-direction: column;
}

/* ── AMBIENT BG ── */
.phone::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(10,132,255,0.22) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 10%, rgba(94,92,230,0.16) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, rgba(10,132,255,0.06) 0%, transparent 40%),
    #000;
  pointer-events: none;
}

/* ── HEADER ── */
.header {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 56px 22px 16px;
}
.brand { font-weight: 800; font-size: 1.1em; letter-spacing: -0.3px; }
.brand span { color: #0A84FF; }
.hbtn { background: none; border: none; padding: 8px; cursor: pointer; opacity: 0.6; }

/* ── BODY ── */
.body {
  position: relative; z-index: 1;
  flex: 1; display: flex; flex-direction: column;
  padding: 0 22px 0;
  overflow-y: auto; scrollbar-width: none;
}
.body::-webkit-scrollbar { display: none; }

/* ── TYPE BADGE ROW ── */
.badge-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 16px;
}
.badge {
  font-size: 0.68em; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
}
.badge-blue { background: rgba(10,132,255,0.18); color: #0A84FF; border: 1px solid rgba(10,132,255,0.3); }
.badge-orange { background: rgba(255,159,10,0.18); color: #FF9F0A; border: 1px solid rgba(255,159,10,0.3); }
.badge-set { background: #0A84FF; color: #fff; border: 1px solid transparent; }

/* ── EXERCISE NAME — HERO ── */
.ex-name-block {
  margin-bottom: 22px;
}
.ex-name {
  font-size: 3.2em;
  font-weight: 900;
  line-height: 0.96;
  letter-spacing: -2.5px;
  text-transform: uppercase;
  color: #fff;
}
.ex-name .main-tag {
  display: inline-block;
  font-size: 0.3em;
  font-weight: 800;
  letter-spacing: 1px;
  color: #FF9F0A;
  background: rgba(255,159,10,0.14);
  border: 1px solid rgba(255,159,10,0.32);
  border-radius: 6px;
  padding: 4px 8px;
  vertical-align: middle;
  margin-right: 10px;
  position: relative;
  top: -6px;
}

/* ── PREV SET PILL ── */
.prev-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(10,132,255,0.1);
  border: 1px solid rgba(10,132,255,0.22);
  border-radius: 10px;
  padding: 7px 14px;
  font-size: 0.82em; font-weight: 600; color: #0A84FF;
  margin-bottom: 28px;
}
.prev-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: #0A84FF; opacity: 0.7; }

/* ── INPUT DISPLAY: big numbers ── */
.inputs-row {
  display: flex; gap: 12px;
  margin-bottom: 28px;
}
.input-card {
  flex: 1;
  background: rgba(28,28,30,0.7);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.10);
  border-top-color: rgba(255,255,255,0.18);
  border-radius: 20px;
  padding: 14px 10px 12px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
}
.input-lbl {
  font-size: 0.6em; color: rgba(142,142,147,0.9); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px;
}
.input-ctrl {
  display: flex; align-items: center; gap: 4px; width: 100%;
  justify-content: space-between;
}
.ctrl-btn {
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.5);
  font-size: 1.1em; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  font-family: inherit;
}
.input-num {
  font-size: 1.9em; font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px; line-height: 1;
  color: #fff;
}
.input-unit {
  font-size: 0.58em; color: rgba(142,142,147,0.7);
  font-weight: 600; margin-top: 4px; text-align: center;
}

/* ── TIMER — DOMINANT ── */
.timer-block {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 28px;
}
.timer-ring {
  position: relative; width: 170px; height: 170px;
}
.timer-ring svg {
  transform: rotate(-90deg);
  width: 100%; height: 100%;
}
.t-bg  { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 5; }
.t-bar {
  fill: none; stroke: #0A84FF; stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 283;
  stroke-dashoffset: 95; /* ~66% */
}
.t-glow {
  fill: none; stroke: rgba(10,132,255,0.2); stroke-width: 12;
  stroke-dasharray: 283; stroke-dashoffset: 95;
}
.timer-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
}
.timer-time {
  font-size: 2.6em; font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: -2px; line-height: 1;
}
.timer-sub {
  font-size: 0.68em; color: rgba(142,142,147,0.7);
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ── LOG SET BUTTON ── */
.btn-log {
  width: 100%;
  background: linear-gradient(135deg, #1a8fff 0%, #0A84FF 50%, #0062cc 100%);
  border: none; border-radius: 20px;
  padding: 22px;
  color: #fff; font-size: 1.25em; font-weight: 800;
  letter-spacing: 0.2px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  box-shadow:
    0 8px 32px rgba(10,132,255,0.5),
    0 2px 8px rgba(10,132,255,0.3),
    inset 0 1px 0 rgba(255,255,255,0.2);
  margin-bottom: 16px;
  position: relative; overflow: hidden;
  font-family: inherit;
}
.btn-log::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 55%);
  pointer-events: none;
}
.btn-log .chev {
  font-size: 1.3em; font-weight: 300; opacity: 0.85;
  margin-top: -1px;
}

/* ── NEXT EXERCISE ── */
.next-ex {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.next-ex-info .lbl {
  font-size: 0.62em; color: rgba(142,142,147,0.7);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.next-ex-info .name {
  font-size: 0.95em; font-weight: 700; color: #fff; margin-top: 3px;
}
.next-ex-arrow {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.4); font-size: 0.9em;
}

/* ── SKIP ── */
.btn-skip {
  width: 100%; background: none;
  border: 1px solid rgba(255,69,58,0.2);
  border-radius: 14px; color: #ff453a;
  padding: 11px; font-size: 0.82em; font-weight: 600;
  cursor: pointer; margin-bottom: 20px;
  font-family: inherit;
}

/* ── TAB BAR ── */
.tab-bar {
  position: relative; z-index: 10;
  background: rgba(10,10,12,0.9);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex; gap: 6px;
  padding: 8px 8px 32px;
}
.tab {
  flex: 1; background: none; border: 1px solid transparent;
  color: rgba(174,174,178,0.55); cursor: pointer;
  padding: 12px 6px; border-radius: 12px; font-family: inherit;
  font-size: 0.9em; font-weight: 700;
}
.tab.active {
  color: #fff;
  background: rgba(10,132,255,0.15);
  border-color: rgba(10,132,255,0.35);
}
</style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="header">
    <button class="hbtn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
        <circle cx="9" cy="14" r="1" fill="white" stroke="none"/>
        <circle cx="15" cy="14" r="1" fill="white" stroke="none"/>
      </svg>
    </button>
    <div class="brand">GYMPRO <span>ELITE</span></div>
    <button class="hbtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Badges -->
    <div class="badge-row">
      <span class="badge badge-blue">TYPE A</span>
      <span class="badge badge-orange">PUSH DAY</span>
      <span class="badge badge-set">SET 2 / 3</span>
    </div>

    <!-- BIG Exercise Name -->
    <div class="ex-name-block">
      <div class="ex-name">
        BENCH<br>PRESS<span class="main-tag">MAIN</span>
      </div>
    </div>

    <!-- Previous set pill -->
    <div class="prev-pill">
      <div class="prev-pill-dot"></div>
      סט קודם: &nbsp;<strong>102.5 kg × 8</strong>&nbsp; RIR 1
    </div>

    <!-- Inputs: Weight / Reps / RIR -->
    <div class="inputs-row">
      <div class="input-card">
        <div class="input-lbl">Weight</div>
        <div class="input-ctrl">
          <button class="ctrl-btn">−</button>
          <div style="text-align:center;">
            <div class="input-num">105</div>
            <div class="input-unit">kg</div>
          </div>
          <button class="ctrl-btn">+</button>
        </div>
      </div>
      <div class="input-card">
        <div class="input-lbl">Reps</div>
        <div class="input-ctrl">
          <button class="ctrl-btn">−</button>
          <div style="text-align:center;">
            <div class="input-num">8</div>
            <div class="input-unit">reps</div>
          </div>
          <button class="ctrl-btn">+</button>
        </div>
      </div>
      <div class="input-card">
        <div class="input-lbl">RIR</div>
        <div class="input-ctrl">
          <button class="ctrl-btn">−</button>
          <div style="text-align:center;">
            <div class="input-num">1</div>
            <div class="input-unit">rir</div>
          </div>
          <button class="ctrl-btn">+</button>
        </div>
      </div>
    </div>

    <!-- Timer — LARGE -->
    <div class="timer-block">
      <div class="timer-ring">
        <svg viewBox="0 0 100 100">
          <circle class="t-glow" cx="50" cy="50" r="45"/>
          <circle class="t-bg"   cx="50" cy="50" r="45"/>
          <circle class="t-bar"  cx="50" cy="50" r="45"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-time">01:22</div>
          <div class="timer-sub">מנוחה</div>
        </div>
      </div>
    </div>

    <!-- LOG SET button -->
    <button class="btn-log">
      LOG SET 3 <span class="chev">›</span>
    </button>

    <!-- Next exercise -->
    <div class="next-ex">
      <div class="next-ex-info">
        <div class="lbl">הבא בתור</div>
        <div class="name">Incline Bench Press</div>
      </div>
      <div class="next-ex-arrow">›</div>
    </div>

    <!-- Skip -->
    <button class="btn-skip">דלג על התרגיל</button>

  </div><!-- /body -->

  <!-- Tab bar -->
  <nav class="tab-bar">
    <button class="tab active">אימון</button>
    <button class="tab">אנליטיקה</button>
    <button class="tab">ארכיון</button>
  </nav>

</div>
</body>
</html>
