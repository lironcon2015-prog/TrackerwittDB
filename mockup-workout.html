<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mockup — Active Workout v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Heebo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0a0a0a;
  color: #fff;
  display: flex; justify-content: center;
  padding: 30px 0 60px;
  min-height: 100vh;
  direction: rtl;
}

.phone {
  width: 390px;
  background: #000;
  border-radius: 44px;
  border: 1.5px solid rgba(255,255,255,0.1);
  overflow: hidden;
  box-shadow:
    0 50px 120px rgba(0,0,0,0.9),
    0 0 0 1px rgba(255,255,255,0.03),
    0 0 80px rgba(50,215,75,0.04);
  display: flex; flex-direction: column;
  min-height: 844px;
  position: relative;
}

/* Ambient — tinted green for active workout feel */
.phone::before {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 50% 35%, rgba(50,215,75,0.09) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 60%, rgba(10,132,255,0.1) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 10%, rgba(94,92,230,0.1) 0%, transparent 40%),
    #000;
}

/* ── HEADER ── */
.header {
  position: relative; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 56px 24px 0;
}
.brand { font-weight: 800; font-size: 1.1em; letter-spacing: -0.3px; }
.brand span { color: #0A84FF; }
.hbtn { background: none; border: none; padding: 8px; cursor: pointer; }

/* ── BODY ── */
.body {
  position: relative; z-index: 1;
  flex: 1; overflow-y: auto; scrollbar-width: none;
  display: flex; flex-direction: column;
  padding: 20px 24px 0;
}
.body::-webkit-scrollbar { display: none; }

/* ── BADGES ── */
.badge-row { display: flex; gap: 8px; margin-bottom: 18px; align-items: center; }
.badge {
  font-size: 0.68em; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 5px 13px; border-radius: 20px;
}
.b-blue   { background: rgba(10,132,255,0.15);  color: #0A84FF;  border: 1px solid rgba(10,132,255,0.28);  }
.b-orange { background: rgba(255,159,10,0.15);  color: #FF9F0A;  border: 1px solid rgba(255,159,10,0.28);  }
.b-white  { background: rgba(255,255,255,0.08); color: #fff;     border: 1px solid rgba(255,255,255,0.12); }

/* ── EXERCISE NAME ── */
.ex-name {
  font-size: 3.4em;
  font-weight: 900;
  line-height: 0.93;
  letter-spacing: -3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.main-tag {
  display: inline-block;
  font-size: 0.28em;
  font-weight: 800; letter-spacing: 1px;
  color: #FF9F0A;
  background: rgba(255,159,10,0.12);
  border: 1px solid rgba(255,159,10,0.3);
  border-radius: 6px;
  padding: 4px 8px;
  vertical-align: middle;
  position: relative; top: -10px;
  margin-right: 10px;
}

/* ── PREV SET PILL ── */
.prev-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(50,215,75,0.08);
  border: 1px solid rgba(50,215,75,0.2);
  border-radius: 10px; padding: 7px 14px;
  font-size: 0.82em; color: #32D74B; font-weight: 600;
  margin-bottom: 32px;
}

/* ── INPUTS: big pill cards ── */
.inputs-row { display: flex; gap: 10px; margin-bottom: 32px; }
.inp-card {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-top-color: rgba(255,255,255,0.16);
  border-radius: 22px;
  padding: 16px 8px 14px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
.inp-lbl {
  font-size: 0.6em; color: rgba(142,142,147,0.8);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
}
.inp-ctrl { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 4px; }
.pm-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.45);
  font-size: 1.2em; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; font-family: inherit; line-height: 1;
}
.inp-val {
  font-size: 2em; font-weight: 800;
  letter-spacing: -1.5px; font-variant-numeric: tabular-nums;
  line-height: 1;
}
.inp-unit {
  font-size: 0.58em; color: rgba(142,142,147,0.65);
  font-weight: 600; letter-spacing: 0.3px;
  margin-top: -4px;
}

/* ── TIMER — GREEN, dominant ── */
.timer-block {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 30px;
}
.timer-ring { position: relative; width: 180px; height: 180px; }
.timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }

.t-shadow { fill: none; stroke: rgba(50,215,75,0.12); stroke-width: 14; }
.t-bg     { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 5; }
.t-bar    {
  fill: none; stroke: #32D74B; stroke-width: 5.5;
  stroke-linecap: round;
  stroke-dasharray: 283; stroke-dashoffset: 90;
  filter: drop-shadow(0 0 6px rgba(50,215,75,0.7));
}

.timer-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.timer-num {
  font-size: 2.8em; font-weight: 300;
  letter-spacing: -3px; font-variant-numeric: tabular-nums;
  color: #fff; line-height: 1;
}
.timer-lbl {
  font-size: 0.65em; color: rgba(142,142,147,0.7);
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
  margin-top: 5px;
}

/* ── LOG SET — pill, green ── */
.btn-log {
  width: 100%;
  background: linear-gradient(135deg, #3ddf5e 0%, #32D74B 45%, #248A3D 100%);
  border: none;
  border-radius: 50px;          /* full pill */
  padding: 22px 28px;
  color: #fff; font-size: 1.2em; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  cursor: pointer;
  box-shadow:
    0 8px 36px rgba(50,215,75,0.45),
    0 2px 10px rgba(50,215,75,0.25),
    inset 0 1px 0 rgba(255,255,255,0.22);
  margin-bottom: 16px;
  position: relative; overflow: hidden;
  font-family: inherit;
}
.btn-log::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 50%);
  pointer-events: none;
}
.btn-log .arr { font-size: 1.4em; font-weight: 300; opacity: 0.9; margin-top: -1px; }

/* ── NEXT EXERCISE ── */
.next-ex {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  padding: 13px 18px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.nex-lbl { font-size: 0.62em; color: rgba(142,142,147,0.65); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.nex-name { font-size: 0.95em; font-weight: 700; margin-top: 3px; }
.nex-arr {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.35); font-size: 0.9em;
}

/* ── SKIP ── */
.btn-skip {
  width: 100%; background: none;
  border: 1px solid rgba(255,69,58,0.2);
  border-radius: 50px; color: #ff453a;
  padding: 12px; font-size: 0.82em; font-weight: 600;
  cursor: pointer; margin-bottom: 20px; font-family: inherit;
}

/* ── TAB BAR ── */
.tab-bar {
  position: relative; z-index: 10;
  background: rgba(8,8,10,0.92);
  backdrop-filter: blur(28px) saturate(200%);
  -webkit-backdrop-filter: blur(28px) saturate(200%);
  border-top: 1px solid rgba(255,255,255,0.09);
  display: flex; gap: 6px;
  padding: 8px 8px 34px;
}
.tab {
  flex: 1; background: none; border: 1px solid transparent;
  color: rgba(174,174,178,0.5); cursor: pointer;
  padding: 12px 6px; border-radius: 14px;
  font-family: inherit; font-size: 0.88em; font-weight: 700;
  transition: all 0.2s;
}
.tab.active {
  color: #fff;
  background: rgba(50,215,75,0.12);
  border-color: rgba(50,215,75,0.3);
}
</style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="header">
    <button class="hbtn" style="opacity:.6;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
        <circle cx="9" cy="14" r="1" fill="white" stroke="none"/>
        <circle cx="15" cy="14" r="1" fill="white" stroke="none"/>
      </svg>
    </button>
    <div class="brand">GYMPRO <span>ELITE</span></div>
    <button class="hbtn" style="opacity:.6;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="badge-row">
      <span class="badge b-blue">TYPE A</span>
      <span class="badge b-orange">PUSH DAY</span>
      <span class="badge b-white">SET 2 / 3</span>
    </div>

    <div class="ex-name">
      BENCH<br>PRESS<span class="main-tag">MAIN</span>
    </div>

    <div class="prev-pill">
      ↑ סט קודם: <strong>102.5 kg × 8</strong> &nbsp;·&nbsp; RIR 1
    </div>

    <!-- Inputs -->
    <div class="inputs-row">
      <div class="inp-card">
        <div class="inp-lbl">Weight</div>
        <div class="inp-ctrl">
          <button class="pm-btn">−</button>
          <div style="text-align:center">
            <div class="inp-val">105</div>
            <div class="inp-unit">kg</div>
          </div>
          <button class="pm-btn">+</button>
        </div>
      </div>
      <div class="inp-card">
        <div class="inp-lbl">Reps</div>
        <div class="inp-ctrl">
          <button class="pm-btn">−</button>
          <div style="text-align:center">
            <div class="inp-val">8</div>
            <div class="inp-unit">reps</div>
          </div>
          <button class="pm-btn">+</button>
        </div>
      </div>
      <div class="inp-card">
        <div class="inp-lbl">RIR</div>
        <div class="inp-ctrl">
          <button class="pm-btn">−</button>
          <div style="text-align:center">
            <div class="inp-val">1</div>
            <div class="inp-unit">rir</div>
          </div>
          <button class="pm-btn">+</button>
        </div>
      </div>
    </div>

    <!-- Timer — GREEN -->
    <div class="timer-block">
      <div class="timer-ring">
        <svg viewBox="0 0 100 100">
          <circle class="t-shadow" cx="50" cy="50" r="45"/>
          <circle class="t-bg"     cx="50" cy="50" r="45"/>
          <circle class="t-bar"    cx="50" cy="50" r="45"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-num">01:22</div>
          <div class="timer-lbl">מנוחה</div>
        </div>
      </div>
    </div>

    <!-- LOG SET — green pill -->
    <button class="btn-log">
      LOG SET 3 <span class="arr">›</span>
    </button>

    <!-- Next exercise -->
    <div class="next-ex">
      <div>
        <div class="nex-lbl">הבא בתור</div>
        <div class="nex-name">Incline Bench Press</div>
      </div>
      <div class="nex-arr">›</div>
    </div>

    <button class="btn-skip">דלג על התרגיל</button>

  </div>

  <!-- Tab bar — active tab green -->
  <nav class="tab-bar">
    <button class="tab active">אימון</button>
    <button class="tab">אנליטיקה</button>
    <button class="tab">ארכיון</button>
  </nav>

</div>
</body>
</html>
