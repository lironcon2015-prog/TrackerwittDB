<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GymPro Elite — Mockup Home v3</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #131313;
    --primary:      #aac7ff;
    --primary-ctr:  #3e90ff;
    --secondary:    #47e266;
    --tertiary:     #ffb868;
    --on-bg:        #e2e2e2;
    --on-var:       #c0c6d6;
    --surface-ctr:  #1f1f1f;
    --surface-var:  #353535;
    --header-h:     54px;
    --nav-h:        76px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--on-bg);
    font-family: 'Inter', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── GLASS ──────────────────────────────────── */
  .glass {
    background: rgba(53, 53, 53, 0.38);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.09);
  }

  .text-glow { text-shadow: 0 0 22px rgba(170,199,255,0.50); }

  /* ── HEADER ─────────────────────────────────── */
  header {
    flex-shrink: 0;
    height: var(--header-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: rgba(9,9,9,0.7);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow: inset 0 -1px 0 0 rgba(255,255,255,0.06);
    z-index: 50;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { color: var(--primary-ctr); }
  .header-title {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 21px; font-style: italic;
    text-transform: uppercase; letter-spacing: -0.05em; color: #f0f0f0;
  }
  .icon-btn {
    background: none; border: none; cursor: pointer;
    padding: 8px; border-radius: 50%; color: #555;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── MAIN ───────────────────────────────────── */
  main {
    flex: 1;
    min-height: 0;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── SECTION HEADER ─────────────────────────── */
  .sec-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2px; margin-bottom: 8px; flex-shrink: 0;
  }
  .sec-title {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 17px; text-transform: uppercase; letter-spacing: -0.03em;
  }

  /* ── HERO ────────────────────────────────────── */
  .hero-section { flex: 3; min-height: 0; display: flex; flex-direction: column; }

  .hero-card {
    flex: 1; min-height: 0;
    position: relative; border-radius: 2rem; overflow: hidden;
    display: flex; flex-direction: column;
    justify-content: space-between; padding: 20px 20px 16px;
  }
  .hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #3e90ff 0%, #6a5af9 52%, #8a2be2 100%);
  }
  .hero-shine {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 85% 15%, rgba(255,255,255,0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 15% 90%, rgba(100,40,220,0.30) 0%, transparent 50%);
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-h1 {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 30px; text-transform: uppercase;
    letter-spacing: -0.04em; line-height: 1; color: #fff; margin-bottom: 14px;
  }
  .hero-stats { display: flex; gap: 22px; }
  .stat-lbl {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: rgba(255,255,255,0.52); margin-bottom: 2px;
  }
  .stat-val {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 19px; letter-spacing: -0.04em; color: #fff;
  }
  .hero-bottom { position: relative; z-index: 2; }
  .ghost-btn {
    background: rgba(255,255,255,0.11);
    border: 1px solid rgba(255,255,255,0.20);
    border-radius: 9999px; padding: 6px 16px;
    color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 700; cursor: pointer;
  }

  /* ── PR TOGGLE ───────────────────────────────── */
  .pill-toggle {
    display: flex; background: var(--surface-ctr);
    border-radius: 9999px; padding: 3px; gap: 2px;
  }
  .pill-btn {
    padding: 4px 10px; border-radius: 9999px; border: none;
    background: transparent; color: #555; font-size: 10px;
    font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; cursor: pointer;
  }
  .pill-btn.active { background: var(--surface-var); color: var(--primary); }

  /* ── PR SECTION ──────────────────────────────── */
  .pr-section { flex: 2.5; min-height: 0; display: flex; flex-direction: column; }

  .pr-card {
    flex: 1; min-height: 0;
    border-radius: 2rem;
    padding: 14px 18px 10px;
    display: flex; flex-direction: column;
  }
  /* top row: label + range chips */
  .pr-top-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px; flex-shrink: 0;
  }
  .pr-lbl {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--on-var);
  }
  .range-chips { display: flex; gap: 4px; }
  .range-chip {
    padding: 3px 9px; border-radius: 9999px; border: none;
    background: rgba(255,255,255,0.06); color: #555;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; cursor: pointer;
  }
  .range-chip.active { background: rgba(170,199,255,0.14); color: var(--primary); }
  /* number row */
  .pr-metric-row {
    display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px;
    flex-shrink: 0;
  }
  .pr-num {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 44px; letter-spacing: -0.05em; line-height: 1;
  }
  .pr-unit {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 20px; opacity: 0.60;
  }
  .pr-delta {
    font-size: 12px; font-weight: 700; color: var(--secondary);
    display: flex; align-items: center; gap: 2px;
    padding: 2px 7px; border-radius: 9999px;
    background: rgba(71,226,102,0.10);
  }
  /* chart */
  .pr-chart-area {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    overflow: hidden; /* מונע גלישה מחוץ לכרטיס */
  }
  .pr-chart-svg {
    width: 100%;
    flex: 1; min-height: 0;
    overflow: hidden;
    display: block;
  }
  .pr-dates {
    display: flex; justify-content: space-between;
    direction: ltr; /* SVG ציר X הולך שמאל→ימין */
    padding: 0 2px; margin-top: 4px; flex-shrink: 0;
  }
  .pr-date-lbl {
    font-size: 9px; font-weight: 500; color: #424956; letter-spacing: 0.01em;
  }

  /* ── WEEK SECTION ────────────────────────────── */
  .week-section { flex: 3; min-height: 0; display: flex; flex-direction: column; }

  .week-grid {
    flex: 1; min-height: 0;
    display: grid; grid-template-columns: 1fr 1fr; gap: 11px;
  }
  .week-card {
    border-radius: 1.75rem;
    padding: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
    position: relative; overflow: hidden;
    transition: transform 0.15s;
  }
  .week-card:active { transform: scale(0.97); }

  /* per-card corner glow */
  .week-card::after {
    content: '';
    position: absolute;
    top: -25px; left: -25px;
    width: 90px; height: 90px;
    border-radius: 50%; filter: blur(24px);
    opacity: 0.32; pointer-events: none;
  }
  .wk1::after { background: var(--primary-ctr); }
  .wk2::after { background: var(--secondary); }
  .wk3::after { background: var(--tertiary); }
  .wkd::after { background: #9b6dff; }
  .wkd { border: 1px solid rgba(155,109,255,0.16); }

  /* watermark */
  .wk-bg-num {
    position: absolute;
    bottom: -6px; right: -2px;
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 76px; line-height: 1;
    text-transform: uppercase; letter-spacing: -0.06em;
    opacity: 0.055; pointer-events: none; user-select: none; color: #fff;
  }

  /* chevron — פינה עליונה, absolute */
  .wk-top {
    position: absolute; top: 12px; left: 14px; /* RTL: left = קצה ויזואלי ימני */
  }
  .wk-chevron { color: #3a3a3a; transition: color 0.2s; }
  .week-card:hover .wk-chevron { color: var(--primary); }

  .wk-name {
    font-family: 'Heebo', sans-serif; font-weight: 900;
    font-size: 26px; text-transform: uppercase;
    letter-spacing: -0.04em; line-height: 1;
    color: var(--on-bg); position: relative; z-index: 1;
    text-align: center;
  }
  .wkd .wk-name { color: #c4a0ff; }

  /* ── BOTTOM NAV ──────────────────────────────── */
  nav {
    flex-shrink: 0;
    height: var(--nav-h);
    display: flex; justify-content: space-around; align-items: center;
    padding: 0 20px;
    background: rgba(22,22,22,0.55);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 2rem 2rem 0 0;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07);
    z-index: 50;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; cursor: pointer; background: none; border: none;
    color: #484f5c; padding: 4px 14px; transition: color 0.2s;
  }
  .nav-lbl {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.09em;
  }
  .nav-btn.active {
    background: linear-gradient(145deg, #3e90ff, #2b5fc9);
    border-radius: 9999px; width: 54px; height: 54px;
    padding: 0; justify-content: center; color: #fff;
    box-shadow: 0 0 22px rgba(62,144,255,0.40);
    gap: 2px;
  }
  .nav-btn.active .nav-lbl { font-size: 8px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <svg class="logo-icon" width="21" height="21" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="9" width="4" height="6" rx="1.5"/>
      <rect x="19" y="9" width="4" height="6" rx="1.5"/>
      <rect x="5" y="7" width="3" height="10" rx="1"/>
      <rect x="16" y="7" width="3" height="10" rx="1"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <span class="header-title">GymPro Elite</span>
  </div>
  <button class="icon-btn">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
               a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
               A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
               l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
               A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
               l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
               a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
               l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
               a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<main>

  <!-- HERO -->
  <div class="hero-section">
    <div class="hero-card">
      <div class="hero-grad"></div>
      <div class="hero-shine"></div>
      <div class="hero-content">
        <h2 class="hero-h1">מוכן לאימון?</h2>
        <div class="hero-stats">
          <div>
            <div class="stat-lbl">נפח אחרון</div>
            <div class="stat-val">4.2t</div>
          </div>
          <div>
            <div class="stat-lbl">משך</div>
            <div class="stat-val">52m</div>
          </div>
          <div>
            <div class="stat-lbl">רצף</div>
            <div class="stat-val">4 ימים</div>
          </div>
        </div>
      </div>
      <div class="hero-bottom">
        <button class="ghost-btn">ערוך תצוגה</button>
      </div>
    </div>
  </div>

  <!-- PR -->
  <div class="pr-section">
    <div class="sec-hdr">
      <span class="sec-title">שיאים אישיים</span>
      <div class="pill-toggle">
        <button class="pill-btn active">Bench Press</button>
        <button class="pill-btn">OHP</button>
      </div>
    </div>

    <div class="pr-card glass">
      <div class="pr-top-row">
        <span class="pr-lbl">E1RM משוערך</span>
        <div class="range-chips">
          <button class="range-chip active">1M</button>
          <button class="range-chip">3M</button>
          <button class="range-chip">כל</button>
        </div>
      </div>
      <div class="pr-metric-row">
        <span class="pr-num text-glow">102.5</span>
        <span class="pr-unit">kg</span>
        <span class="pr-delta">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4l8 16H4z"/></svg>
          2.5
        </span>
      </div>

      <div class="pr-chart-area">
        <!--
          נקודות: 15/3→95  19/3→97.5  22/3→97.5  26/3→100  30/3→100  2/4→102.5
          viewBox 0 0 280 52 | Y: min=93 max=105, range=12 → factor=52/12=4.33
            95   → (105-95)  *4.33 = 43.3
            97.5 → (105-97.5)*4.33 = 32.5
            100  → (105-100) *4.33 = 21.7
            102.5→ (105-102.5)*4.33= 10.8
          X: 0, 56, 112, 168, 224, 280
        -->
        <svg class="pr-chart-svg" viewBox="0 0 280 52" preserveAspectRatio="none">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#47e266" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#47e266" stop-opacity="1"/>
            </linearGradient>
            <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#47e266" stop-opacity="0.14"/>
              <stop offset="100%" stop-color="#47e266" stop-opacity="0"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <path d="M 0,43 L 56,32 L 112,32 L 168,22 L 224,22 L 280,11 L 280,52 L 0,52 Z"
                fill="url(#fill)"/>
          <path d="M 0,43 L 56,32 L 112,32 L 168,22 L 224,22 L 280,11"
                fill="none" stroke="url(#lg)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
          <g filter="url(#glow)">
            <circle cx="0"   cy="43" r="3"   fill="#47e266"/>
            <circle cx="56"  cy="32" r="3"   fill="#47e266"/>
            <circle cx="112" cy="32" r="3"   fill="#47e266"/>
            <circle cx="168" cy="22" r="3"   fill="#47e266"/>
            <circle cx="224" cy="22" r="3"   fill="#47e266"/>
            <circle cx="280" cy="11" r="3.5" fill="#47e266"/>
          </g>
        </svg>
        <div class="pr-dates">
          <span class="pr-date-lbl">15/3</span>
          <span class="pr-date-lbl">19/3</span>
          <span class="pr-date-lbl">22/3</span>
          <span class="pr-date-lbl">26/3</span>
          <span class="pr-date-lbl">30/3</span>
          <span class="pr-date-lbl">2/4</span>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEKS -->
  <div class="week-section">
    <div class="sec-hdr">
      <span class="sec-title">בחר תוכנית</span>
    </div>

    <div class="week-grid">

      <button class="week-card glass wk1">
        <span class="wk-bg-num">1</span>
        <div class="wk-top">
          <svg class="wk-chevron" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
        <div class="wk-name">שבוע 1</div>
      </button>

      <button class="week-card glass wk2">
        <span class="wk-bg-num">2</span>
        <div class="wk-top">
          <svg class="wk-chevron" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
        <div class="wk-name">שבוע 2</div>
      </button>

      <button class="week-card glass wk3">
        <span class="wk-bg-num">3</span>
        <div class="wk-top">
          <svg class="wk-chevron" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
        <div class="wk-name">שבוע 3</div>
      </button>

      <button class="week-card glass wkd">
        <span class="wk-bg-num">D</span>
        <div class="wk-top">
          <svg class="wk-chevron" width="17" height="17" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
        <div class="wk-name">דילואוד</div>
      </button>

    </div>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-btn active">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="9" width="4" height="6" rx="1.5"/>
      <rect x="19" y="9" width="4" height="6" rx="1.5"/>
      <rect x="5" y="7" width="3" height="10" rx="1"/>
      <rect x="16" y="7" width="3" height="10" rx="1"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    <span class="nav-lbl">אימון</span>
  </button>

  <button class="nav-btn">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="13" width="4" height="8" rx="1"/>
      <rect x="10" y="8" width="4" height="13" rx="1"/>
      <rect x="17" y="4" width="4" height="17" rx="1"/>
    </svg>
    <span class="nav-lbl">אנליטיקה</span>
  </button>

  <button class="nav-btn">
    <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="5" rx="1"/>
      <path d="M4 8v11a2 2 0 002 2h12a2 2 0 002-2V8"/>
      <line x1="9" y1="14" x2="15" y2="14"/>
    </svg>
    <span class="nav-lbl">ארכיון</span>
  </button>
</nav>

</body>
</html>
